name: Send Email via SMTP

on:
  workflow_dispatch:   # 手动触发，方便测试
  # schedule:
  #   - cron: '0 8 * * 1'   # 也可以按计划运行，例如每周一早8点

jobs:
  send-mail:
    runs-on: ubuntu-latest
    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.exmail.qq.com
          server_port: 465
          secure: true                  # 使用 SSL
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: Hello from Github workflow
          to: ${{ secrets.TO_EMAIL }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: This is a test email sent automatically by GitHub Actions workflow.
          priority: normal
