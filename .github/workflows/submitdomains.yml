name: ctlog domains submmit

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp idna cryptography
        mkdir -p dnsx_install
        cd dnsx_install
        curl -L https://github.com/projectdiscovery/dnsx/releases/download/v1.2.1/dnsx_1.2.1_linux_amd64.zip -o dnsx.zip
        unzip -o dnsx.zip
        chmod +x dnsx
        sudo mv dnsx /usr/local/bin/
        cd ..
        rm -rf dnsx_install   # 可选清理

    - name: Run Python script
      run: python sub/ct_logs/ct_colletor.py


    - name: Run dnsx on normal_domains.txt
      run: |
        # 对 normal_domains.txt 进行 A 记录探测，输出到 dnsx_output.txt
        dnsx -l normal_domains.txt -a -o dnsx_output.txt
        # 如果你希望保留原始的域名 → IP 映射，可省略 -resp-only 并添加 -a
        # 例如: dnsx -l normal_domains.txt -a -silent -o dnsx_output.txt
        echo "dnsx finished, output lines: $(wc -l < dnsx_output.txt)"

    # ===== 上传 Artifact，增加 dnsx 输出文件 =====
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: script-output-files
        path: |
          normal_domains.txt
          failed_entries.log
          failed_batches.log
          dnsx_output.txt          # 新增
