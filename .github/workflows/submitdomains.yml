name: ctlog domains submmit

# 触发条件：你可以根据需要修改。这里配置为推送到 main 分支时触发，以及允许手动触发(workflow_dispatch)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-and-upload:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出仓库代码
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 设置 Python 环境（这里以 Python 3.10 为例）
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # cache: 'pip' # 如果你有 requirements.txt，可以开启缓存加速

    # 3. 安装依赖（如果你的脚本需要第三方库，请取消下面的注释并确保仓库根目录有 requirements.txt）
    # - name: Install dependencies
    #   run: |
    #     python -m pip install --upgrade pip
    #     if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. 执行指定路径下的 Python 脚本
    # 注意：如果你的脚本在运行后会生成输出文件（例如 output.log 或 result.csv），它通常会出现在当前工作目录下或脚本同级目录下
    - name: Run Python script
      run: |
        python sub/ct_logs/ct_colletor.py

    # 5. 将脚本的输出文件上传到 Artifact
    # 请将 'path' 修改为你脚本实际生成的文件或文件夹路径（支持通配符，如 sub/ct_logs/outputs/*）
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: script-output-files  # 下载时显示的 Artifact 名称
        path: |
          sub/ct_logs/*.log
          sub/ct_logs/*.csv
          output.txt
        # 注：上面 path 的写法只是示例，请根据你脚本实际输出的文件名和路径进行替换。
        # 如果你想把整个 sub/ct_logs/ 目录都传上去，可以直接写 path: sub/ct_logs/
